name: Opposition QC Gate

# Runs the QC gate whenever the master CSV (or the gate code) changes, and on
# manual trigger. The CSV committed in the repo is the source of record, so the
# gate reads it directly. A red run means at least one record was blocked.
# Code lives in data-center-map/qc/; this file lives at .github/workflows/qc.yml.

on:
  workflow_dispatch:
  push:
    paths:
      - "master_opposition.csv"
      - "qc/**"

permissions:
  contents: write          # lets the workflow push the refreshed clean feed back

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Self-test the gate
        working-directory: qc
        run: python qc_pipeline.py --selftest

      - name: Run the QC gate
        working-directory: qc
        run: |
          python qc_pipeline.py --csv ../master_opposition.csv --out qc_out || true
          test -f qc_out/clean_export.json

      - name: Enforce logical QC findings
        if: always()
        working-directory: qc
        run: |
          python - <<'PY'
          import json, sys
          from collections import Counter
          report = json.load(open('qc_out/qc_report.json', encoding='utf-8'))
          counts = Counter()
          for v in report.get('verdicts', []):
              for issue in v.get('issues', []):
                  counts[issue.get('code')] += 1
          gated = ['ACTION_COMPLETE_MISMATCH', 'STATUS_VOCAB']
          bad = {k: counts[k] for k in gated if counts[k] > 0}
          if bad:
              print('Failing due to QC logic findings:', bad)
              sys.exit(1)
          print('No gated logical QC findings.')
          PY

      - name: Post report to summary
        if: always()
        working-directory: qc
        run: cat qc_out/qc_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit the clean feed back to the repo
        if: always()
        run: |
          cp qc/qc_out/clean_export.json qc/clean_export.json
          cp qc/qc_out/quarantine.json  qc/quarantine.json
          cp qc/qc_out/qc_report.md     qc/qc_report.md
          if [ -n "$(git status --porcelain qc/clean_export.json qc/quarantine.json qc/qc_report.md)" ]; then
            git config user.name  "qc-bot"
            git config user.email "qc-bot@users.noreply.github.com"
            git add qc/clean_export.json qc/quarantine.json qc/qc_report.md
            git commit -m "QC: refresh clean feed [skip ci]"
            git push
          else
            echo "No change to the clean feed."
          fi

      - name: Upload feed and quarantine as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qc-output
          path: |
            qc/qc_out/clean_export.json
            qc/qc_out/quarantine.json
            qc/qc_out/qc_report.json
