name: Fetch Census county features

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch ACS + Gazetteer
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python fetch_census_features.py
      - name: Spot-check against pinned reference values
        run: python spot_check_census.py
      - name: Commit candidate reference file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/county_census_features.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Census county features (ACS5 2023 + Gazetteer) [reference data]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying in 10s"
            sleep 10
          done
          echo "Push failed after 3 attempts. If branch protection is enabled on main, allow github-actions[bot] to push or merge via PR."
          exit 1
