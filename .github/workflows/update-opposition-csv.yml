name: Update opposition CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '15 11 * * *'

permissions:
  contents: write

jobs:
  build-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CSV build
        run: python scripts/build_master_csv.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add master_opposition.csv
          git diff --cached --quiet || git commit -m "Update master_opposition.csv"
          git push
