name: Update opposition CSV

on:
  workflow_run:
    workflows: ["Scrape TrackDataCenters proposals"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: '15 11 * * *'

permissions:
  contents: write
  issues: write

jobs:
  build-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run CSV build
        run: python scripts/build_master_csv.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add master_opposition.csv
          # Harvest queue is written by the same job. It is review material,
          # never database content, so it commits alongside but separately.
          git add data/signal_candidates.csv data/signal_harvest_log.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update master_opposition.csv + harvest queue"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failure: ${context.workflow}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
