<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Center Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<!-- ============================================================
     CUSTOMIZATION GUIDE
     ============================================================
     BASEMAP STYLES (swap the tileLayer URL below):
       Dark (current):  https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png
       Light:           https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png
       Satellite:       https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
       OSM Standard:    https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
       Voyager:         https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png

     COLORS — change these CSS variables in :root:
       --accent        Atlas marker / cluster color  (default teal  #4f98a3)
       --accent2       AI DC marker color            (default orange #e8943a)
       --bg            Page background
       --surface       Header/footer background

     INITIAL MAP VIEW — change map center and zoom in the JS section below:
       center: [LAT, LON]   e.g. [38.5, -97] for USA, [51.5, -0.1] for London
       zoom:   4            lower = more zoomed out, higher = more zoomed in

     MARKER SHAPES — edit the SVG strings in atlasIcon() and aiIcon below:
       Atlas uses circles, AI DCs use hexagons — swap for any SVG shape

     CLUSTER RADIUS — change maxClusterRadius (default 40px):
       Lower = clusters break apart sooner as you zoom in
       Higher = more aggressive clustering
     ============================================================ -->

<style>
  :root {
    /* ── Edit these to change the color scheme ── */
    --bg:      #1a1a1a;
    --surface: #242424;
    --border:  #333;
    --text:    #e0e0e0;
    --muted:   #999;
    --accent:  #4f98a3;   /* Atlas markers & clusters */
    --accent2: #e8943a;   /* AI DC markers */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap; z-index: 1000; flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: var(--text); white-space: nowrap; }
  .logo svg { color: var(--accent); }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1; }
  .layer-btn {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted); cursor: pointer; font-size: 12px;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .layer-btn.active        { background: var(--accent);  border-color: var(--accent);  color: #fff; }
  .layer-btn.active.ai     { background: var(--accent2); border-color: var(--accent2); }
  .dot       { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-atlas { background: var(--accent); }
  .dot-ai    { background: var(--accent2); }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px 5px 30px; border-radius: 20px; font-size: 12px; width: 200px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  #map { flex: 1; }
  .stats-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 16px; font-size: 11px; color: var(--muted);
    display: flex; gap: 20px; flex-shrink: 0; flex-wrap: wrap;
  }
  .stats-bar span b { color: var(--text); }
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(26,26,26,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; gap: 12px; font-size: 14px; color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Popup styles ── */
  .leaflet-popup-content-wrapper {
    background: #1e1e1e; border: 1px solid #444; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); color: #e0e0e0;
  }
  .leaflet-popup-tip { background: #1e1e1e; }
  .leaflet-popup-content { margin: 12px 14px; min-width: 220px; max-width: 320px; }
  .popup-title  { font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #fff; line-height: 1.3; }
  .popup-badge  { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-bottom: 8px; font-weight: 500; }
  .badge-atlas  { background: rgba(79,152,163,0.2); color: #4f98a3; border: 1px solid rgba(79,152,163,0.3); }
  .badge-ai     { background: rgba(232,148,58,0.2); color: #e8943a; border: 1px solid rgba(232,148,58,0.3); }
  .popup-row    { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; margin: 3px 0; }
  .popup-label  { color: #888; }
  .popup-val    { color: #ddd; text-align: right; max-width: 180px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Data Center Atlas">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M6 7h4M6 11h4M14 7h4M14 11h4"/>
    </svg>
    Data Center Atlas
  </div>
  <div class="controls">
    <button class="layer-btn active" id="btn-atlas" onclick="toggleLayer('atlas')">
      <span class="dot dot-atlas"></span> IM3 Open Source Atlas (<span id="atlas-count">…</span>)
    </button>
    <button class="layer-btn active ai" id="btn-ai" onclick="toggleLayer('ai')">
      <span class="dot dot-ai"></span> Major AI Data Centers (<span id="ai-count">…</span>)
    </button>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search name, operator, state…" oninput="onSearch(this.value)"/>
  </div>
</header>

<div style="position:relative; flex:1; display:flex; flex-direction:column;">
  <div id="map" style="flex:1;"></div>
  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <span>Loading data…</span>
  </div>
</div>

<div class="stats-bar">
  <span>Visible: <b id="vis-count">—</b> locations</span>
  <span>IM3 Atlas: <b id="stat-atlas">—</b></span>
  <span>AI Data Centers: <b id="stat-ai">—</b></span>
  <span style="margin-left:auto; color:#555">© OpenStreetMap contributors | IM3 Open Source Data Center Atlas | Epoch AI</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script>

// ============================================================
// MAP CONFIGURATION — edit these values to customize behavior
// ============================================================
const CONFIG = {
  // Starting view — [latitude, longitude] and zoom level (1-18)
  center: [38.5, -97],
  zoom: 4,

  // Basemap tile URL — swap for a different style (see comments in <head>)
  tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',

  // How aggressively to cluster Atlas markers (pixels, default 40)
  clusterRadius: 40,

  // Atlas marker size in pixels
  atlasMarkerSize: 10,

  // AI DC marker size in pixels
  aiMarkerSize: 18,
};
// ============================================================

const map = L.map('map', { center: CONFIG.center, zoom: CONFIG.zoom, preferCanvas: true });

L.tileLayer(CONFIG.tileUrl, {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Icons ────────────────────────────────────────────────────
const rootStyle = getComputedStyle(document.documentElement);
const accentColor  = rootStyle.getPropertyValue('--accent').trim();
const accent2Color = rootStyle.getPropertyValue('--accent2').trim();

function atlasIcon(type) {
  const c = type === 'campus' ? '#6bcfda' : accentColor;
  const s = CONFIG.atlasMarkerSize;
  return L.divIcon({
    className: '',
    html: `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${c}" fill-opacity="0.85" stroke="#fff" stroke-width="1"/></svg>`,
    iconSize: [s,s], iconAnchor: [s/2,s/2]
  });
}

const aiIcon = (function() {
  const s = CONFIG.aiMarkerSize;
  const h = s/2;
  // Hexagon points for a given size
  const pts = [
    `${h},1`, `${s-2},${Math.round(h*0.5)}`, `${s-2},${Math.round(h*1.5)}`,
    `${h},${s-1}`, `2,${Math.round(h*1.5)}`, `2,${Math.round(h*0.5)}`
  ].join(' ');
  return L.divIcon({
    className: '',
    html: `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><polygon points="${pts}" fill="${accent2Color}" fill-opacity="0.92" stroke="#fff" stroke-width="1.5"/></svg>`,
    iconSize: [s,s], iconAnchor: [h,h]
  });
})();

// ── Cluster group ─────────────────────────────────────────────
const atlasCluster = L.markerClusterGroup({
  maxClusterRadius: CONFIG.clusterRadius,
  iconCreateFunction(cluster) {
    const c = cluster.getChildCount();
    const sz = c > 500 ? 40 : c > 100 ? 34 : 28;
    return L.divIcon({
      html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${accentColor}cc;border:2px solid ${accentColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;">${c}</div>`,
      iconSize: [sz,sz], className: ''
    });
  }
});
const aiLayer = L.layerGroup();
map.addLayer(atlasCluster);
map.addLayer(aiLayer);

// ── State ─────────────────────────────────────────────────────
let atlasMarkers = [], aiMarkers = [];
let atlasVisible = true, aiVisible = true;
let currentQuery = '';

function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

// ── Load CSVs ─────────────────────────────────────────────────
function loadAtlas() {
  return new Promise(resolve => {
    Papa.parse('./atlas.csv', {
      download: true, header: true, skipEmptyLines: true,
      complete({ data }) {
        data.forEach(d => {
          const lat = num(d.lat), lon = num(d.lon);
          if (!lat && !lon) return;
          const m = L.marker([lat, lon], { icon: atlasIcon(d.type) });
          const sqft = num(d.sqft) > 0 ? (num(d.sqft)/1e6).toFixed(2) + 'M sq ft' : 'N/A';
          m.bindPopup(`
            <div class="popup-title">${d.name || 'Unnamed Facility'}</div>
            <span class="popup-badge badge-atlas">IM3 Atlas</span>
            <div class="popup-row"><span class="popup-label">Operator</span><span class="popup-val">${d.operator || '—'}</span></div>
            <div class="popup-row"><span class="popup-label">Location</span><span class="popup-val">${d.county}, ${d.state}</span></div>
            <div class="popup-row"><span class="popup-label">Size</span><span class="popup-val">${sqft}</span></div>
            <div class="popup-row"><span class="popup-label">Type</span><span class="popup-val">${d.type}</span></div>
          `);
          m._searchText = ((d.name||'') + ' ' + (d.operator||'') + ' ' + (d.state||'') + ' ' + (d.county||'')).toLowerCase();
          atlasMarkers.push(m);
          atlasCluster.addLayer(m);
        });
        document.getElementById('atlas-count').textContent = atlasMarkers.length.toLocaleString();
        document.getElementById('stat-atlas').textContent = atlasMarkers.length.toLocaleString() + ' buildings & campuses';
        resolve();
      }
    });
  });
}

function loadAI() {
  return new Promise(resolve => {
    Papa.parse('./ai_centers.csv', {
      download: true, header: true, skipEmptyLines: true,
      complete({ data }) {
        data.forEach(d => {
          const lat = num(d.lat), lon = num(d.lon);
          if (!lat && !lon) return;
          const m = L.marker([lat, lon], { icon: aiIcon, zIndexOffset: 1000 });
          const power = num(d['Current power (MW)']) > 0 ? num(d['Current power (MW)']) + ' MW' : 'TBD';
          const cost  = num(d['Current total capital cost (2025 USD billions)']) > 0
            ? '$' + num(d['Current total capital cost (2025 USD billions)']).toFixed(1) + 'B' : 'TBD';
          const h100  = num(d['Current H100 equivalents']) > 0
            ? Math.round(num(d['Current H100 equivalents'])).toLocaleString() : 'TBD';
          m.bindPopup(`
            <div class="popup-title">${d.Name}</div>
            <span class="popup-badge badge-ai">AI Data Center</span>
            <div class="popup-row"><span class="popup-label">Owner</span><span class="popup-val">${d.Owner||'—'}</span></div>
            <div class="popup-row"><span class="popup-label">Users</span><span class="popup-val">${d.Users||'—'}</span></div>
            <div class="popup-row"><span class="popup-label">Power</span><span class="popup-val">${power}</span></div>
            <div class="popup-row"><span class="popup-label">Capital Cost</span><span class="popup-val">${cost}</span></div>
            <div class="popup-row"><span class="popup-label">H100 equiv.</span><span class="popup-val">${h100}</span></div>
            <div class="popup-row"><span class="popup-label">Country</span><span class="popup-val">${d.Country||'—'}</span></div>
            <div class="popup-row"><span class="popup-label">Address</span><span class="popup-val">${d.Address||'—'}</span></div>
          `);
          m._searchText = ((d.Name||'') + ' ' + (d.Owner||'') + ' ' + (d.Users||'') + ' ' + (d.Country||'')).toLowerCase();
          aiMarkers.push(m);
          aiLayer.addLayer(m);
        });
        document.getElementById('ai-count').textContent = aiMarkers.length.toLocaleString();
        document.getElementById('stat-ai').textContent = aiMarkers.length.toLocaleString() + ' hyperscale AI facilities';
        resolve();
      }
    });
  });
}

Promise.all([loadAtlas(), loadAI()]).then(() => {
  document.getElementById('loader').style.display = 'none';
  updateCount();
});

// ── Layer toggles ─────────────────────────────────────────────
function toggleLayer(which) {
  if (which === 'atlas') {
    atlasVisible = !atlasVisible;
    const btn = document.getElementById('btn-atlas');
    if (atlasVisible) { map.addLayer(atlasCluster); btn.classList.add('active'); }
    else { map.removeLayer(atlasCluster); btn.classList.remove('active'); }
  } else {
    aiVisible = !aiVisible;
    const btn = document.getElementById('btn-ai');
    if (aiVisible) { map.addLayer(aiLayer); btn.classList.add('active', 'ai'); }
    else { map.removeLayer(aiLayer); btn.classList.remove('active', 'ai'); }
  }
  updateCount();
}

// ── Search ────────────────────────────────────────────────────
let searchTimeout;
function onSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentQuery = val.toLowerCase().trim(); applySearch(); }, 300);
}

function applySearch() {
  atlasCluster.clearLayers();
  aiLayer.clearLayers();
  let ac = 0, bc = 0;
  atlasMarkers.forEach(m => {
    if (!currentQuery || m._searchText.includes(currentQuery)) {
      if (atlasVisible) atlasCluster.addLayer(m);
      ac++;
    }
  });
  aiMarkers.forEach(m => {
    if (!currentQuery || m._searchText.includes(currentQuery)) {
      if (aiVisible) aiLayer.addLayer(m);
      bc++;
    }
  });
  document.getElementById('vis-count').textContent = (ac + bc).toLocaleString();
}

function updateCount() {
  const a = atlasVisible ? atlasMarkers.length : 0;
  const b = aiVisible   ? aiMarkers.length   : 0;
  document.getElementById('vis-count').textContent = (a + b).toLocaleString();
}
</script>
</body>
</html>
