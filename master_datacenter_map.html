<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Center Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  --bg:#0f1218; --panel:#161c25; --panel2:#1c242f; --text:#eef2f7;
  --muted:#8a96a4; --border:#2c3544;
  --atlas:#4f98a3; --ai:#e67e22;
}
* { box-sizing:border-box; margin:0; padding:0 }
body { font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); height:100dvh; overflow:hidden }
.app { display:grid; grid-template-columns:380px 1fr; height:100vh }
.sidebar { background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column }
.header { padding:14px 16px 12px; border-bottom:1px solid var(--border) }
.logo { display:flex; align-items:center; gap:8px; margin-bottom:4px }
.logo svg { color:var(--atlas) }
h1 { font-size:17px; font-weight:700 }
.sub { font-size:11px; color:var(--muted); line-height:1.45 }
.source-pills { display:flex; gap:6px; margin-top:6px }
.pill { font-size:10px; padding:2px 8px; border-radius:999px; font-weight:600 }
.pill-atlas { background:#1a3040; color:var(--atlas) }
.pill-ai    { background:#3b2208; color:var(--ai) }
.filters { padding:10px 12px; border-bottom:1px solid var(--border); background:var(--panel2); display:flex; flex-direction:column; gap:7px }
.search-wrap { position:relative }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none }
.search-wrap input { padding-left:32px }
input, select { width:100%; padding:7px 10px; border-radius:8px; border:1px solid var(--border); background:#0c1018; color:var(--text); font-size:12px; outline:none }
input:focus, select:focus { border-color:var(--atlas) }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:7px }
.chk { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); cursor:pointer }
.chk input[type=checkbox] { width:auto; accent-color:var(--atlas) }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:5px }
.stat { padding:8px 6px; border:1px solid var(--border); border-radius:8px; background:#0c1018; text-align:center }
.stat b { display:block; font-size:16px; font-weight:700 }
.stat span { font-size:10px; color:var(--muted) }
.stat.s-atlas b { color:var(--atlas) }
.stat.s-ai b    { color:var(--ai) }
.list { overflow-y:auto; flex:1; padding:8px }
.card { padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:#0c1018; margin-bottom:7px; cursor:pointer; transition:border-color .15s }
.card:hover { border-color:#4a5a72 }
.card-title { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:4px }
.card-meta { font-size:11px; color:var(--muted); display:flex; flex-wrap:wrap; margin-bottom:4px }
.card-meta span { margin-right:10px }
.src-tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:9px; font-weight:700; margin-left:4px; vertical-align:middle }
.src-atlas { background:#1a3040; color:var(--atlas) }
.src-ai    { background:#3b2208; color:var(--ai) }
.card-snippet { font-size:11px; color:var(--muted); line-height:1.45; margin-top:4px }
.mapwrap { position:relative; flex:1 }
#map { height:100vh }
.legend { position:absolute; top:12px; right:12px; z-index:500; background:rgba(15,18,24,.93); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:11px; padding:10px 13px; font-size:12px }
.legend b { color:var(--text); display:block; margin-bottom:5px }
.legend-row { display:flex; align-items:center; gap:7px; margin:4px 0; color:var(--muted) }
.lsw { width:10px; height:10px; border-radius:50%; flex-shrink:0 }
.note { font-size:10px; color:#505d6e; margin-top:7px; max-width:190px; line-height:1.4 }
.leaflet-popup-content-wrapper { background:#1a2030; border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,.5); color:var(--text) }
.leaflet-popup-tip { background:#1a2030 }
.leaflet-popup-content { margin:12px 14px; min-width:220px; max-width:340px }
.p-title { font-size:14px; font-weight:700; margin-bottom:6px; line-height:1.3 }
.p-grid { display:grid; grid-template-columns:auto 1fr; gap:4px 11px; font-size:12px; margin:7px 0 }
.p-label { color:#8a96a4 }
.p-val { color:#d8e0ea; word-break:break-word }
.p-notes { font-size:11px; color:#9aabb7; border-top:1px solid #2c3544; padding-top:7px; margin-top:3px; line-height:1.5; max-height:80px; overflow-y:auto }
.p-links { margin-top:7px; display:flex; gap:9px; flex-wrap:wrap }
.p-link { font-size:11px; color:#5aa9e6; text-decoration:none }
.p-link:hover { text-decoration:underline }
@media (max-width:860px) {
  .app { grid-template-columns:1fr; grid-template-rows:45vh 55vh }
  .sidebar { height:45vh }
  #map { height:55vh }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <h1>Data Center Map</h1>
      </div>
      <div class="sub">IM3 Open Source Atlas (1,479 facilities) + AI hyperscale sites (29)</div>
      <div class="source-pills">
        <span class="pill pill-atlas">IM3 Atlas</span>
        <span class="pill pill-ai">AI Centers</span>
      </div>
    </div>

    <div class="filters">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="q" type="text" placeholder="Name, operator, state, owner…" oninput="debounce()"/>
      </div>
      <div class="row2">
        <select id="fState"  onchange="render()"><option value="">All states</option></select>
        <select id="fSource" onchange="render()"><option value="">Both layers</option><option value="atlas">IM3 Atlas</option><option value="ai">AI Centers</option></select>
      </div>
      <div class="row2">
        <select id="fOwner" onchange="render()"><option value="">All owners</option></select>
        <select id="fType"  onchange="render()"><option value="">All types</option></select>
      </div>
      <label class="chk"><input type="checkbox" id="aiOnly" onchange="render()"/> AI hyperscale only</label>
      <div class="stats">
        <div class="stat"><b id="cAll">—</b><span>Visible</span></div>
        <div class="stat s-atlas"><b id="cAtlas">—</b><span>Atlas</span></div>
        <div class="stat s-ai"><b id="cAI">—</b><span>AI sites</span></div>
      </div>
    </div>

    <div id="list" class="list"></div>
  </aside>

  <div class="mapwrap">
    <div id="map"></div>
    <div class="legend">
      <b>Layer</b>
      <div class="legend-row"><span class="lsw" style="background:var(--atlas)"></span>IM3 Atlas facility</div>
      <div class="legend-row"><span class="lsw" style="background:var(--ai)"></span>AI hyperscale site</div>
      <div class="note">Atlas pins cluster at low zoom. AI sites always visible. Click any pin for details.</div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', { center:[39.5,-98.35], zoom:4, preferCanvas:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:19, attribution:'© OpenStreetMap contributors © CARTO'
}).addTo(map);

// Atlas cluster group
const atlasCluster = L.markerClusterGroup({
  maxClusterRadius:40,
  iconCreateFunction(c) {
    const n=c.getChildCount(), sz=n>500?46:n>100?38:30;
    return L.divIcon({ className:'', iconSize:[sz,sz],
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#1a3a42;border:2px solid #4f98a3;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#7ecfda">${n}</div>`
    });
  }
});
map.addLayer(atlasCluster);

// AI layer (no clustering — always visible)
const aiLayer = L.layerGroup().addTo(map);

const esc = s => String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmt = (v, suffix='') => (v && !isNaN(+v)) ? Number(v).toLocaleString()+suffix : (v||'—');
const srcTag = s => s==='ai'
  ? '<span class="src-tag src-ai">AI</span>'
  : '<span class="src-tag src-atlas">Atlas</span>';

let rows=[], leafletMarkers=[], markerLayers=[];

function atlasIcon() {
  return L.circleMarker([0,0], { radius:4, fillColor:'#4f98a3', fillOpacity:0.8, color:'#7ecfda', weight:1 });
}

function aiIcon(r) {
  const mw = +r['Current power (MW)'] || 0;
  const sz = mw > 800 ? 22 : mw > 400 ? 17 : 13;
  return L.divIcon({ className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2],
    html:`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><polygon points="${sz/2},1 ${sz-1},${sz*0.8} 1,${sz*0.8}" fill="#e67e22" fill-opacity="0.9" stroke="#ffa040" stroke-width="1.5"/></svg>`
  });
}

function buildAtlasPopup(r) {
  return `
    <div class="p-title">${esc(r.name||'Unnamed facility')} ${srcTag('atlas')}</div>
    <div class="p-grid">
      <span class="p-label">State</span>    <span class="p-val">${esc(r.state)}</span>
      <span class="p-label">County</span>   <span class="p-val">${esc(r.county)}</span>
      ${r.operator ? `<span class="p-label">Operator</span><span class="p-val">${esc(r.operator)}</span>` : ''}
      ${r.sqft ? `<span class="p-label">Sq ft</span><span class="p-val">${fmt(r.sqft)}</span>` : ''}
      ${r.type ? `<span class="p-label">Type</span><span class="p-val">${esc(r.type)}</span>` : ''}
    </div>`;
}

function buildAIPopup(r) {
  const sources = (r['Selected Sources']||'').match(/https?:\/\/[^\s\)]+/g) || [];
  const links = sources.slice(0,3).map(u => `<a class="p-link" href="${esc(u)}" target="_blank" rel="noopener">Source ↗</a>`).join('');
  const calcLink = r['Calculations sheet'] ? `<a class="p-link" href="${esc(r['Calculations sheet'])}" target="_blank" rel="noopener">Calculations ↗</a>` : '';
  return `
    <div class="p-title">${esc(r.Name)} ${srcTag('ai')}</div>
    <div class="p-grid">
      <span class="p-label">Owner</span>    <span class="p-val">${esc(r.Owner)}</span>
      <span class="p-label">Users</span>    <span class="p-val">${esc(r.Users)}</span>
      <span class="p-label">Power</span>    <span class="p-val">${fmt(r['Current power (MW)'],' MW')}</span>
      <span class="p-label">H100 equiv</span><span class="p-val">${r['Current H100 equivalents'] ? Number(r['Current H100 equivalents']).toLocaleString(undefined,{maximumFractionDigits:0}) : '—'}</span>
      <span class="p-label">Cap cost</span> <span class="p-val">${r['Current total capital cost (2025 USD billions)'] ? '$'+Number(r['Current total capital cost (2025 USD billions)']).toFixed(1)+'B' : '—'}</span>
      ${r.Project ? `<span class="p-label">Project</span><span class="p-val">${esc(r.Project)}</span>` : ''}
      ${r.Address ? `<span class="p-label">Address</span><span class="p-val">${esc(r.Address)}</span>` : ''}
    </div>
    ${r.Notes ? `<div class="p-notes">${esc(r.Notes).slice(0,400)}</div>` : ''}
    ${links||calcLink ? `<div class="p-links">${links}${calcLink}</div>` : ''}`;
}

function match(r) {
  const q   = document.getElementById('q').value.trim().toLowerCase();
  const fSt = document.getElementById('fState').value;
  const fSr = document.getElementById('fSource').value;
  const fOw = document.getElementById('fOwner').value;
  const fTy = document.getElementById('fType').value;
  const aiO = document.getElementById('aiOnly').checked;

  if (aiO && r._src !== 'ai') return false;
  if (fSr && r._src !== fSr) return false;
  if (fSt && r._state !== fSt) return false;
  if (fOw && r._owner !== fOw) return false;
  if (fTy && r._type !== fTy) return false;
  if (!q) return true;
  return r._search.includes(q);
}

function render() {
  atlasCluster.clearLayers();
  aiLayer.clearLayers();
  const list = document.getElementById('list');
  list.innerHTML = '';
  let cAtlas=0, cAI=0, listCount=0;

  rows.forEach((r,i) => {
    if (!match(r)) return;
    const m = leafletMarkers[i];
    if (r._src === 'atlas') { atlasCluster.addLayer(m); cAtlas++; }
    else { aiLayer.addLayer(m); cAI++; }

    // Only show AI sites + first 200 atlas in list (performance)
    if (r._src === 'ai' || listCount < 200) {
      listCount++;
      const card = document.createElement('div');
      card.className = 'card';
      if (r._src === 'ai') {
        const dr = r._raw;
        card.innerHTML = `
          <div class="card-title">${esc(dr.Name)}${srcTag('ai')}</div>
          <div class="card-meta"><span>${esc(dr.Owner)}</span><span>${fmt(dr['Current power (MW)'],' MW')}</span></div>
          <div class="card-snippet">Users: ${esc(dr.Users)} · $${dr['Current total capital cost (2025 USD billions)']?Number(dr['Current total capital cost (2025 USD billions)']).toFixed(1)+'B':'—'} · ${esc(dr.Address||'').slice(0,60)}</div>`;
      } else {
        const dr = r._raw;
        card.innerHTML = `
          <div class="card-title">${esc(dr.name||'Unnamed')}${srcTag('atlas')}</div>
          <div class="card-meta"><span>${esc(dr.state)}</span><span>${esc(dr.county)}</span>${dr.sqft?`<span>${fmt(dr.sqft)} sqft</span>`:''}</div>
          ${dr.operator?`<div class="card-snippet">${esc(dr.operator)}</div>`:''}`;
      }
      card.onclick = () => { map.setView([+r._raw.lat||+r._raw.lat, +r._raw.lon||+r._raw.lon], 10); m.openPopup(); };
      list.appendChild(card);
    }
  });

  if (listCount >= 200) {
    const note = document.createElement('div');
    note.style.cssText = 'padding:10px;text-align:center;font-size:11px;color:#8a96a4';
    note.textContent = `+ more Atlas facilities on map. Use search or filters to narrow down.`;
    list.appendChild(note);
  }

  document.getElementById('cAll').textContent   = (cAtlas+cAI).toLocaleString();
  document.getElementById('cAtlas').textContent = cAtlas.toLocaleString();
  document.getElementById('cAI').textContent    = cAI.toLocaleString();
}

let dt;
function debounce() { clearTimeout(dt); dt = setTimeout(render, 280); }

function initRows(atlasData, aiData) {
  // Atlas rows
  atlasData.forEach(r => {
    if (!r.lat || !r.lon || isNaN(+r.lat) || isNaN(+r.lon)) return;
    const m = L.circleMarker([+r.lat, +r.lon], {
      radius:4, fillColor:'#4f98a3', fillOpacity:0.8, color:'#7ecfda', weight:1
    }).bindPopup(buildAtlasPopup(r));
    rows.push({ _src:'atlas', _state:r.state_abb||r.state||'', _owner:r.operator||'', _type:r.type||'', _search:[r.name,r.operator,r.state,r.county].join(' ').toLowerCase(), _raw:r });
    leafletMarkers.push(m);
  });

  // AI rows
  aiData.forEach(r => {
    if (!r.lat || !r.lon || isNaN(+r.lat) || isNaN(+r.lon)) return;
    const m = L.marker([+r.lat, +r.lon], { icon: aiIcon(r), zIndexOffset:1000 }).bindPopup(buildAIPopup(r));
    rows.push({ _src:'ai', _state:'', _owner:r.Owner||'', _type:'', _search:[r.Name,r.Owner,r.Users,r.Project,r.Address].join(' ').toLowerCase(), _raw:r });
    leafletMarkers.push(m);
  });

  // Populate state dropdown from atlas
  const states = [...new Set(atlasData.map(r=>r.state_abb||r.state).filter(Boolean))].sort();
  states.forEach(v => document.getElementById('fState').insertAdjacentHTML('beforeend',`<option value="${esc(v)}">${esc(v)}</option>`));

  // Owner dropdown from AI
  const owners = [...new Set(aiData.map(r=>r.Owner).filter(Boolean))].sort();
  owners.forEach(v => document.getElementById('fOwner').insertAdjacentHTML('beforeend',`<option value="${esc(v)}">${esc(v)}</option>`));

  // Type from atlas
  const types = [...new Set(atlasData.map(r=>r.type).filter(Boolean))].sort();
  types.forEach(v => document.getElementById('fType').insertAdjacentHTML('beforeend',`<option value="${esc(v)}">${esc(v)}</option>`));

  render();
}

// Load both CSVs in parallel
let atlasLoaded=null, aiLoaded=null;
function tryInit() { if(atlasLoaded && aiLoaded) initRows(atlasLoaded, aiLoaded); }

Papa.parse('./atlas.csv', { download:true, header:true, skipEmptyLines:true,
  complete({data}) { atlasLoaded=data; tryInit(); }});

Papa.parse('./ai_centers.csv', { download:true, header:true, skipEmptyLines:true,
  complete({data}) { aiLoaded=data; tryInit(); }});
</script>
</body>
</html>
